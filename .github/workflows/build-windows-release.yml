name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: windows-venv-py312-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            windows-venv-py312-

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build package
        shell: cmd
        env:
          AUTO_BDSP_RNG_OCR_SMOKE_MODE: import
          AUTO_BDSP_RNG_OCR_SMOKE_TIMEOUT: 300
          AUTO_BDSP_RNG_ZIP_COMPRESSLEVEL: 1
        run: build_exe.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-bdsp-rng-windows-x64
          path: release/auto-bdsp-rng-v*-windows-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/auto-bdsp-rng-v*-windows-x64.zip
