name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Cache virtual environment
        uses: actions/cache@v4
        with:
          path: .venv
          key: windows-venv-py312-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            windows-venv-py312-

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build package
        shell: cmd
        env:
          AUTO_BDSP_RNG_OCR_SMOKE_MODE: import
          AUTO_BDSP_RNG_OCR_SMOKE_TIMEOUT: 300
          AUTO_BDSP_RNG_ZIP_COMPRESSLEVEL: 1
        run: build_exe.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-bdsp-rng-windows-x64
          path: release/auto-bdsp-rng-v*-windows-x64.zip

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: 珍钻复刻自动乱数 ${{ github.ref_name }}
          body: |
            ## 珍钻复刻自动乱数 ${{ github.ref_name }}

            这是正式发布版。普通用户请下载下面的 Windows x64 绿色版压缩包：

            `auto-bdsp-rng-${{ github.ref_name }}-windows-x64.zip`

            请不要下载 GitHub 自动生成的 `Source code (zip)` 或 `Source code (tar.gz)`，那些是源码包，不能直接双击运行。

            ### 使用方式

            1. 下载 `auto-bdsp-rng-${{ github.ref_name }}-windows-x64.zip`
            2. 解压 zip
            3. 进入 `auto-bdsp-rng` 文件夹
            4. 双击 `珍钻复刻自动乱数.exe`

            ### 说明

            - Windows x64 onedir 绿色版，不需要安装 Python。
            - 请保留 exe 旁边的 `_internal`、`script`、`bridge` 等目录，不要只复制 exe。
            - 首次启动或首次 OCR 初始化可能较慢。
            - 自动乱数流程仍需要游戏窗口、采集环境、串口/驱动、EasyCon 或兼容后端等实际运行环境。
            - 本软件永久免费且开源，请勿购买倒卖版本。
          draft: false
          prerelease: false
          make_latest: true
          files: release/auto-bdsp-rng-v*-windows-x64.zip
